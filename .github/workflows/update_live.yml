name: update_live

on:
  workflow_dispatch:
  schedule:
    - cron:  "0 */6 * * *"

concurrency:
  group: update_live
  cancel-in-progress: true

jobs:
  update_live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch/sentence_transformers
          key: hf-cache-${{ runner.os }}-py311-v1
          restore-keys: |
            hf-cache-${{ runner.os }}-py311-

      - name: Preflight DATABASE_URL
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "Missing DATABASE_URL secret"
            exit 1
          fi

      - name: Install dependencies
        working-directory: backend
        run: pip install --disable-pip-version-check --prefer-binary -r requirements.txt

      - name: Run live update
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONWARNINGS: "ignore::DeprecationWarning"
          BACKFILL_EMBED_LIMIT: "600"
          CLUSTER_MAX_ROUNDS: "3"
          CLUSTER_MAX_ARTICLES: "300"
        run: |
          set -euo pipefail
          python -m scripts.update_live --write
